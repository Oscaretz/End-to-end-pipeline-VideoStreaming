version: '3.9'

services:
  # PostgreSQL para Airflow
  postgres-airflow:
    image: postgres:13
    container_name: airflow_postgres_db
    environment:
      - POSTGRES_USER=airflow_db_user
      - POSTGRES_PASSWORD=airflow_db_password
      - POSTGRES_DB=airflow_db
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow_db_user -d airflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # Inicialización de Airflow
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airflow_init
    depends_on:
      - postgres-airflow
    environment:
      - AIRFLOW_HOME=/opt/airflow
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow_db_user:airflow_db_password@postgres-airflow:5432/airflow_db
    entrypoint: >
      /bin/bash -c "
      airflow db migrate &&
      airflow users create --username airflow --firstname Air --lastname Flow --role Admin --email airflow@example.com --password airflow
      "
    networks:
      - backend

  # Webserver de Airflow
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airflow_webserver
    restart: always
    depends_on:
      - postgres-airflow
    environment:
      - AIRFLOW_HOME=/opt/airflow
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/opt/airflow
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow_db_user:airflow_db_password@postgres-airflow:5432/airflow_db
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      - AIRFLOW__API__AUTH_BASIC_USERNAME=airflow
      - AIRFLOW__API__AUTH_BASIC_PASSWORD=airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./sql:/opt/airflow/sql
      - ./sqlite_db:/opt/airflow/sqlite_db
      - ./config.py:/opt/airflow/config.py
      - ./requirements.txt:/opt/airflow/requirements.txt
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    ports:
      - "8080:8080"
    command: airflow webserver
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Scheduler de Airflow
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airflow_scheduler
    restart: always
    depends_on:
      - postgres-airflow
    environment:
      - AIRFLOW_HOME=/opt/airflow
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/opt/airflow
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow_db_user:airflow_db_password@postgres-airflow:5432/airflow_db
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./sql:/opt/airflow/sql
      - ./sqlite_db:/opt/airflow/sqlite_db
      - ./config.py:/opt/airflow/config.py
      - ./requirements.txt:/opt/airflow/requirements.txt
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    command: airflow scheduler
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'airflow scheduler'"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MongoDB independiente
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - backend

  # MySQL independiente
  mysql:
    image: mysql:8.0
    container_name: mysql_server
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=mydb
      - MYSQL_USER=myuser
      - MYSQL_PASSWORD=mypass
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5


networks:
  backend:
    driver: bridge

volumes:
  mongodb-data:
  mysql-data:
